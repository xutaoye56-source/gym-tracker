<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>Gym Workout Tracker</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090b;
      --bg-elev: #101317;
      --bg-soft: #151a20;
      --card: #12161b;
      --card-2: #171c22;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f2f5f7;
      --muted: #a0acb8;
      --muted-2: #778390;
      --accent: #ff8a1f;
      --accent-2: #20c997;
      --good: #2cd67d;
      --warn: #ffd166;
      --danger: #ff6b6b;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      --radius: 18px;
      --radius-sm: 14px;
      --gap: 14px;
      --maxw: 920px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tap: 48px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 138, 31, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(32, 201, 151, 0.10), transparent 24%),
        linear-gradient(180deg, #0a0b0d 0%, #07080a 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      padding-bottom: calc(28px + var(--safe-bottom));
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      background: none;
    }

    .app {
      width: min(100%, var(--maxw));
      margin: 0 auto;
      padding:
        calc(16px + var(--safe-top))
        14px
        24px;
    }

    .hero {
      padding: 10px 2px 14px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 138, 31, 0.12);
      color: #ffb56d;
      border: 1px solid rgba(255, 138, 31, 0.18);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .title {
      margin: 12px 0 8px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.04;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      max-width: 60ch;
    }

    .toolbar {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .segmented,
    .week-switch {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .week-switch {
      grid-template-columns: repeat(2, 1fr);
    }

    .seg-btn,
    .week-btn {
      min-height: var(--tap);
      border-radius: 14px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease, box-shadow 160ms ease;
      position: relative;
      overflow: hidden;
    }

    .seg-btn[aria-pressed="true"],
    .week-btn[aria-pressed="true"] {
      background: linear-gradient(180deg, rgba(255, 138, 31, 0.23), rgba(255, 138, 31, 0.14));
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(255, 138, 31, 0.22);
    }

    .seg-btn:active,
    .week-btn:active,
    .icon-btn:active,
    .timer-action:active,
    .summary-chip:active {
      transform: scale(0.98);
    }

    .state-grid {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .panel {
      padding: 15px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .panel-meta {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .summary-chip {
      display: grid;
      gap: 2px;
      padding: 12px 12px 11px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      color: inherit;
      text-align: left;
    }

    .summary-chip strong {
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .summary-chip span {
      color: var(--muted);
      font-size: 12px;
    }

    .note {
      margin-top: 12px;
      padding: 12px 13px;
      border-radius: 16px;
      background: rgba(32, 201, 151, 0.10);
      border: 1px solid rgba(32, 201, 151, 0.18);
      color: #c7f9e9;
      font-size: 13px;
      line-height: 1.5;
    }

    .note strong {
      color: #ffffff;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 12px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .workout-list {
      display: grid;
      gap: 12px;
    }

    .exercise-card {
      position: relative;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: border-color 180ms ease, transform 180ms ease, background 180ms ease, opacity 180ms ease;
    }

    .exercise-card.done {
      background: linear-gradient(180deg, rgba(44, 214, 125, 0.10), rgba(32, 201, 151, 0.06));
      border-color: rgba(44, 214, 125, 0.30);
      opacity: 0.82;
    }

    .exercise-card.done::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: linear-gradient(180deg, rgba(44, 214, 125, 0.95), rgba(32, 201, 151, 0.78));
      pointer-events: none;
    }

    .exercise-card.done .exercise-name,
    .exercise-card.done .exercise-index {
      color: #dbffe8;
    }

    .exercise-card.done .muted,
    .exercise-card.done .detail-body,
    .exercise-card.done .stat {
      color: #c2d8c8;
    }

    .exercise-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
    }

    .exercise-main {
      flex: 1;
      min-width: 0;
    }

    .exercise-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .exercise-index {
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .exercise-name {
      margin: 0;
      font-size: 18px;
      line-height: 1.18;
      letter-spacing: -0.02em;
    }

    .exercise-en {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tag.sets {
      font-size: 1.08em;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--accent);
      background: rgba(255, 138, 31, 0.12);
      border-color: rgba(255, 138, 31, 0.24);
    }

    .tag.equipment-machine {
      color: #cde7ff;
      background: rgba(54, 132, 255, 0.12);
      border-color: rgba(54, 132, 255, 0.24);
    }

    .tag.equipment-dumbbell {
      color: #ffe2c3;
      background: rgba(255, 149, 54, 0.16);
      border-color: rgba(255, 149, 54, 0.26);
    }

    .tag.equipment-bodyweight {
      color: #dff8e8;
      background: rgba(44, 214, 125, 0.12);
      border-color: rgba(44, 214, 125, 0.22);
    }

    .tag.accent {
      color: #ffe2c3;
      background: rgba(255, 138, 31, 0.12);
      border-color: rgba(255, 138, 31, 0.18);
    }

    .tag.good {
      color: #dafbe6;
      background: rgba(44, 214, 125, 0.11);
      border-color: rgba(44, 214, 125, 0.18);
    }

    .stats {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .stats strong {
      color: var(--text);
    }

    .weight-area {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .weight-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .weight-input {
      width: 110px;
      min-height: 40px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      outline: none;
    }

    .weight-input::placeholder {
      color: var(--muted-2);
    }

    .weight-input:focus {
      border-color: rgba(255, 138, 31, 0.44);
      box-shadow: 0 0 0 3px rgba(255, 138, 31, 0.14);
    }

    .weight-tip {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .points {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .points li {
      display: flex;
      gap: 8px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
    }

    .points li::before {
      content: "";
      width: 8px;
      height: 8px;
      margin-top: 6px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--accent), #ffb05a);
      flex: 0 0 auto;
      box-shadow: 0 0 0 4px rgba(255, 138, 31, 0.10);
    }

    .exercise-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .icon-btn {
      min-width: 48px;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      background: rgba(255, 138, 31, 0.15);
      border: 1px solid rgba(255, 138, 31, 0.22);
      color: #ffd2a8;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.01em;
    }

    .check-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 48px;
      min-height: 48px;
      padding: 0 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      transition: background 160ms ease, border-color 160ms ease;
      cursor: pointer;
      user-select: none;
    }

    .check-text {
      font-size: 12px;
      font-weight: 800;
      color: #dafbe6;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .check-wrap input {
      width: 20px;
      height: 20px;
      accent-color: var(--good);
      cursor: pointer;
    }

    .detail {
      border-top: 1px solid var(--line);
      padding: 0 14px 14px;
    }

    .detail > summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 46px;
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
    }

    .detail > summary::-webkit-details-marker {
      display: none;
    }

    .detail > summary::after {
      content: "展开";
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .detail[open] > summary::after {
      content: "收起";
    }

    .detail-body {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      padding: 2px 0 2px;
    }

    .detail-body p {
      margin: 0 0 8px;
    }

    .detail-body p:last-child {
      margin-bottom: 0;
    }

    .footer-panel {
      margin-top: 16px;
    }

    .footer-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .footer-action {
      min-height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 800;
    }

    .footer-action.primary {
      background: linear-gradient(180deg, rgba(255, 138, 31, 0.24), rgba(255, 138, 31, 0.14));
      border-color: rgba(255, 138, 31, 0.24);
      color: #fff4ea;
    }

    .week-stat-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .day-stat {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
    }

    .day-stat .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .day-stat .value {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .day-stat .sub {
      display: block;
      margin-top: 4px;
      color: var(--muted-2);
      font-size: 12px;
    }

    .progress {
      margin-top: 12px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #ffb85b 55%, var(--accent-2));
      border-radius: inherit;
      transition: width 220ms ease;
    }

    .footer-text {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .timer-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(4, 6, 8, 0.78);
      backdrop-filter: blur(12px);
      z-index: 40;
    }

    .timer-overlay.show {
      display: flex;
    }

    .timer-modal {
      width: min(100%, 460px);
      padding: 20px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(18, 22, 27, 0.98), rgba(11, 13, 16, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.56);
      text-align: center;
    }

    .timer-kicker {
      display: inline-flex;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 138, 31, 0.12);
      border: 1px solid rgba(255, 138, 31, 0.20);
      color: #ffd5b0;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .timer-title {
      margin: 14px 0 6px;
      font-size: 20px;
      line-height: 1.2;
    }

    .timer-detail {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .timer-number {
      margin: 18px 0 16px;
      font-size: clamp(64px, 24vw, 108px);
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: -0.06em;
      color: #fff;
      text-shadow: 0 0 30px rgba(255, 138, 31, 0.2);
    }

    .timer-progress {
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .timer-progress > div {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: inherit;
      transition: width 1s linear;
    }

    .timer-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .timer-action {
      min-height: 50px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 800;
    }

    .timer-action.primary {
      background: linear-gradient(180deg, rgba(255, 138, 31, 0.24), rgba(255, 138, 31, 0.14));
      border-color: rgba(255, 138, 31, 0.22);
      color: #fff4ea;
    }

    .timer-action.danger {
      background: rgba(255, 107, 107, 0.12);
      border-color: rgba(255, 107, 107, 0.20);
      color: #ffd7d7;
    }

    .timer-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 22px;
      line-height: 1;
    }

    .timer-modal-wrap {
      position: relative;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .empty {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    @media (min-width: 720px) {
      .toolbar {
        grid-template-columns: 1.6fr 1fr;
      }

      .state-grid {
        grid-template-columns: 1.1fr 0.9fr;
      }

      .footer-panel {
        grid-column: 1 / -1;
      }

      .workout-list {
        gap: 14px;
      }

      .exercise-head {
        padding: 16px;
      }

      .detail {
        padding: 0 16px 16px;
      }

      .footer-actions {
        max-width: 360px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <span class="eyebrow">Gym Workout Tracker</span>
      <h1 class="title">健身计划网页</h1>
      <p class="subtitle">
        三个训练日、两周切换、组间计时器、✔ 搞定状态全部离线运行。页面状态会保存在本机
        <code>localStorage</code>，适合手机浏览器和 GitHub Pages 直接使用。🔒 你的数据永不离开你的设备
      </p>

      <div class="toolbar">
        <div class="segmented" role="tablist" aria-label="训练日切换">
          <button class="seg-btn" data-day="A" role="tab" aria-pressed="true">训练A<br><span style="font-size:12px;font-weight:600;opacity:.75;">上肢 + 核心</span></button>
          <button class="seg-btn" data-day="B" role="tab" aria-pressed="false">训练B<br><span style="font-size:12px;font-weight:600;opacity:.75;">下肢 + 核心</span></button>
          <button class="seg-btn" data-day="C" role="tab" aria-pressed="false">训练C<br><span style="font-size:12px;font-weight:600;opacity:.75;">全身</span></button>
        </div>

        <div class="week-switch" aria-label="周次切换">
          <button class="week-btn" data-week="1" aria-pressed="true">第1周</button>
          <button class="week-btn" data-week="2" aria-pressed="false">第2周</button>
        </div>
      </div>
    </section>

    <section class="state-grid">
      <article class="panel">
        <div class="panel-head">
          <div>
            <h2 class="panel-title" id="dayTitle">训练A · 上肢+核心</h2>
            <p class="panel-meta" id="dayMeta">预计时长 50 分钟 · 6 个动作</p>
          </div>
          <div class="tag accent" id="weekBadge">第1周</div>
        </div>

        <div class="summary-row" id="sessionSummary"></div>
        <div class="note" id="weekNote"></div>
      </article>

      <aside class="panel">
        <div class="panel-head">
          <div>
            <h2 class="panel-title">本周完成情况</h2>
            <p class="panel-meta">统计当前周次的所有动作打卡</p>
          </div>
        </div>
        <div class="summary-row" id="overallSummary"></div>
        <div class="progress" aria-label="完成进度">
          <div id="progressBar"></div>

        progressText: document.getElementById("progressText"),
        dayStats: document.getElementById("dayStats"),
        workoutHeading: document.getElementById("workoutHeading"),
        workoutHint: document.getElementById("workoutHint"),
        workoutList: document.getElementById("workoutList"),
        timerOverlay: document.getElementById("timerOverlay"),
        timerTitle: document.getElementById("timerTitle"),
        timerDetail: document.getElementById("timerDetail"),
        timerNumber: document.getElementById("timerNumber"),
        timerProgressBar: document.getElementById("timerProgressBar"),
        timerToggle: document.getElementById("timerToggle"),
        timerReset: document.getElementById("timerReset"),
        timerDone: document.getElementById("timerDone"),
        timerClose: document.getElementById("timerClose"),
        exportDataBtn: document.getElementById("exportDataBtn"),
        importDataBtn: document.getElementById("importDataBtn"),
        importDataInput: document.getElementById("importDataInput"),
      };

      let timerState = {
        active: false,
        duration: 0,
        remaining: 0,
        endAt: 0,
        pausedAt: 0,
        raf: 0,
        item: null,
        paused: false,
      };

      init();

      function init() {
        bindTabs();
        bindWeekSwitch();
        bindTimerControls();
        bindDataControls();
        render();
      }

      function loadState(key, fallback) {
        const raw = localStorage.getItem(key);
        if (raw == null) return fallback;
        if (key === STORAGE.day) {
          return ["A", "B", "C"].includes(raw) ? raw : fallback;
        }
        if (key === STORAGE.week) {
          return raw === "2" ? 2 : 1;
        }
        return raw;
      }

      function saveState(key, value) {
        localStorage.setItem(key, String(value));
      }

      function bindDataControls() {
        els.exportDataBtn.addEventListener("click", exportData);
        els.importDataBtn.addEventListener("click", () => els.importDataInput.click());
        els.importDataInput.addEventListener("change", handleImportFile);
      }

      function storageKey(day, week, itemId) {
        return `${STORAGE.donePrefix}week:${week}:day:${day}:exercise:${itemId}`;
      }

      function weightStorageKey(day, week, itemId) {
        return `${STORAGE.weightPrefix}week:${week}:day:${day}:exercise:${itemId}`;
      }

      function getStoredWeight(day, week, itemId) {
        const currentKey = weightStorageKey(day, week, itemId);
        const currentValue = localStorage.getItem(currentKey);
        if (currentValue !== null) {
          return currentValue;
        }
        if (week === 2) {
          const previousValue = localStorage.getItem(weightStorageKey(day, 1, itemId));
          return previousValue ?? "";
        }
        return "";
      }

      function getPreviousWeekWeight(day, week, itemId) {
        if (week !== 2) return "";
        const previousValue = localStorage.getItem(weightStorageKey(day, 1, itemId));
        return previousValue ?? "";
      }

      function setWeight(day, week, itemId, value) {
        localStorage.setItem(weightStorageKey(day, week, itemId), value);
      }

      function exportData() {
        const payload = {};
        for (let index = 0; index < localStorage.length; index += 1) {
          const key = localStorage.key(index);
          if (key && key.startsWith("gym-tracker:")) {
            payload[key] = localStorage.getItem(key);
          }
        }

        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `gym-tracker-export-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 0);
      }

      async function handleImportFile(event) {
        const file = event.target.files && event.target.files[0];
        event.target.value = "";
        if (!file) return;
        const confirmed = window.confirm("导入会覆盖当前 gym-tracker 数据，是否继续？");
        if (!confirmed) return;

        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          const entries = Array.isArray(parsed)
            ? parsed
            : parsed && typeof parsed === "object"
              ? Object.entries(parsed)
              : [];

          if (entries.length === 0) {
            throw new Error("JSON 中没有可导入的数据");
          }

          const imported = entries.filter((entry) => {
            if (Array.isArray(entry)) {
              return typeof entry[0] === "string" && entry[0].startsWith("gym-tracker:");
            }
            return false;
          });

          if (imported.length === 0) {
            throw new Error("未找到 gym-tracker:* 键");
          }

          const existingKeys = [];
          for (let index = 0; index < localStorage.length; index += 1) {
            const key = localStorage.key(index);
            if (key && key.startsWith("gym-tracker:")) {
              existingKeys.push(key);
            }
          }
          existingKeys.forEach((key) => localStorage.removeItem(key));
          imported.forEach(([key, value]) => {
            localStorage.setItem(key, String(value));
          });
          state.day = loadState(STORAGE.day, state.day);
          state.week = loadState(STORAGE.week, state.week);
          render();
        } catch (error) {
          window.alert(`导入失败：${error.message}`);
        }
      }

      function getWorkout(day = state.day) {
        return workouts[day];
      }

      function getItems(day = state.day) {
        return getWorkout(day).items;
      }

      function isDone(day, week, itemId) {
        return localStorage.getItem(storageKey(day, week, itemId)) === "1";
      }

      function setDone(day, week, itemId, done) {
        const key = storageKey(day, week, itemId);
        if (done) {
          localStorage.setItem(key, "1");
        } else {
          localStorage.removeItem(key);
        }
      }

      function bindTabs() {
        document.querySelectorAll(".seg-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            state.day = btn.dataset.day;
            saveState(STORAGE.day, state.day);
            render();
          });
        });
      }

      function bindWeekSwitch() {
        document.querySelectorAll(".week-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            state.week = Number(btn.dataset.week);
            saveState(STORAGE.week, state.week);
            render();
          });
        });
      }

      function bindTimerControls() {
        els.timerToggle.addEventListener("click", toggleTimer);
        els.timerReset.addEventListener("click", () => {
          if (timerState.item) startTimer(timerState.item);
        });
        els.timerDone.addEventListener("click", finishTimer);
        els.timerClose.addEventListener("click", closeTimer);
        els.timerOverlay.addEventListener("click", (event) => {
          if (event.target === els.timerOverlay) closeTimer();
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && els.timerOverlay.classList.contains("show")) {
            closeTimer();
          }
        });
      }

      function render() {
        const workout = getWorkout();
        const items = workout.items;
        const total = items.length;
        const doneCount = items.filter((item) => isDone(state.day, state.week, item.id)).length;

        document.querySelectorAll(".seg-btn").forEach((btn) => {
          btn.setAttribute("aria-pressed", String(btn.dataset.day === state.day));
        });

        document.querySelectorAll(".week-btn").forEach((btn) => {
          btn.setAttribute("aria-pressed", String(Number(btn.dataset.week) === state.week));
        });

        els.dayTitle.textContent = `${workout.title} · ${workout.subtitle}`;
        els.dayMeta.textContent = `预计时长 ${workout.duration} 分钟 · ${total} 个动作`;
        els.weekBadge.textContent = `第${state.week}周`;
        els.weekNote.innerHTML = weekNoteHTML(state.day, state.week);
        els.workoutHeading.textContent = `${workout.title} 动作列表`;
        els.workoutHint.textContent = state.week === 1 ? "点击右上角计时按钮开始组间倒数" : "第2周按建议尝试加重量";

        renderSessionSummary(workout, doneCount, total);
        renderOverallSummary();
        renderDayStats();
        renderWorkoutList(items);
        renderProgress(items, doneCount, total);
      }

      function weekNoteHTML(day, week) {
        const base = getWorkout(day);
        const emphasis = week === 2
          ? `<strong>第2周提示：</strong>${day === "C" ? "同第1周，但所有动作都建议尝试比上周 +2.5kg 或 +1 格。" : "尝试比上周 +2.5kg 或 +1 格。"}`
          : `<strong>第1周提示：</strong>先把动作质量和节奏做稳。`;
        return `<strong>热身：</strong>${base.summary}。<br>${emphasis}`;
      }

      function renderSessionSummary(workout, doneCount, total) {
        const elapsed = workout.duration;
        els.sessionSummary.innerHTML = `
          <button class="summary-chip" type="button" aria-label="预计时长 ${elapsed} 分钟">
            <strong>${elapsed} 分钟</strong>
            <span>预计时长</span>
          </button>
          <button class="summary-chip" type="button" aria-label="完成 ${doneCount} / ${total}">
            <strong>${doneCount}/${total}</strong>
            <span>本日打卡</span>
          </button>
        `;
      }

      function renderOverallSummary() {
        const summary = [
          { day: "A", label: "训练A" },
          { day: "B", label: "训练B" },
          { day: "C", label: "训练C" },
        ].map(({ day, label }) => {
          const count = getItems(day).filter((item) => isDone(day, state.week, item.id)).length;
          const total = getItems(day).length;
          return `
            <button class="summary-chip" type="button" aria-label="${label} 完成 ${count} / ${total}">
              <strong>${count}/${total}</strong>
              <span>${label}</span>
            </button>
          `;
        }).join("");

        els.overallSummary.innerHTML = summary;
      }

      function renderDayStats() {
        const stats = ["A", "B", "C"].map((day) => {
          const workout = workouts[day];
          const done = workout.items.filter((item) => isDone(day, state.week, item.id)).length;
          const total = workout.items.length;
          const label = `${workout.title} ${workout.subtitle}`;
          return `
            <div class="day-stat">
              <span class="label">${label}</span>
              <div class="value">${done}/${total}</div>
              <span class="sub">${state.week === 2 ? "第2周记录" : "第1周记录"}</span>
            </div>
          `;
        }).join("");
        els.dayStats.innerHTML = stats;
      }

      function renderWorkoutList(items) {
        els.workoutList.innerHTML = items.map((item) => renderExerciseCard(item)).join("");
        els.workoutList.querySelectorAll("[data-toggle-check]").forEach((input) => {
          input.addEventListener("change", () => {
            const { day, week, itemId } = input.dataset;
            setDone(day, Number(week), itemId, input.checked);
            render();
          });
        });
        els.workoutList.querySelectorAll("[data-weight-input]").forEach((input) => {
          input.addEventListener("input", () => {
            const { day, week, itemId } = input.dataset;
            setWeight(day, Number(week), itemId, input.value);
          });
        });
        els.workoutList.querySelectorAll("[data-timer]").forEach((button) => {
          button.addEventListener("click", () => {
            const itemId = button.dataset.timer;
            const item = items.find((entry) => entry.id === itemId);
            if (item) startTimer(item);
          });
        });
      }

      function renderExerciseCard(item) {
        const checked = isDone(state.day, state.week, item.id);
        const points = item.keyPoints.map((point) => `<li>${escapeHTML(point)}</li>`).join("");
        const guide = getExerciseGuide(item);
        const weightValue = getStoredWeight(state.day, state.week, item.id);
        const previousWeight = getPreviousWeekWeight(state.day, state.week, item.id);
        const equipment = getEquipmentMeta(item.equipment);
        const guideHTML = guide.blocks.map((block) => `<p>${escapeHTML(block)}</p>`).join("");
        return `
          <article class="exercise-card ${checked ? "done" : ""}" data-card="${item.id}">
            <div class="exercise-head">
              <div class="exercise-main">
                <div class="exercise-index">动作 ${item.number}</div>
                <div class="exercise-top">
                  <div>
                    <h3 class="exercise-name">
                      ${escapeHTML(item.name)}
                      <span class="exercise-en">${escapeHTML(item.en)}</span>
                    </h3>
                    <div class="meta-row">
                      <span class="tag ${equipment.className}">${equipment.icon} ${escapeHTML(equipment.label)}</span>
                      <span class="tag sets">${escapeHTML(item.sets)} · 歇 ${item.rest}s</span>
                    </div>
                  </div>
                  <div class="exercise-actions">
                    <button class="icon-btn" type="button" data-timer="${item.id}" aria-label="计时 ${item.name}">
                      计时
                    </button>
                    <label class="check-wrap" aria-label="✔ 搞定 ${item.name}">
                      <span class="check-text">✔ 搞定</span>
                      <input
                        type="checkbox"
                        data-toggle-check
                        data-day="${state.day}"
                        data-week="${state.week}"
                        data-item-id="${item.id}"
                        ${checked ? "checked" : ""}
                      />
                    </label>
                  </div>
                </div>
                <div class="stats">
                  <div><strong>组间休息：</strong>${item.rest}s</div>
                </div>
                <div class="weight-area">
                  <div class="weight-row">
                    <input
                      class="weight-input"
                      type="number"
                      inputmode="decimal"
                      min="0"
                      step="0.5"
                      placeholder="重量 kg"
                      data-weight-input
                      data-day="${state.day}"
                      data-week="${state.week}"
                      data-item-id="${item.id}"
                      value="${escapeHTML(weightValue)}"
                      aria-label="${escapeHTML(item.name)} 重量 kg"
                    />
                    <span class="tag accent">重量记录</span>
                  </div>
                  ${previousWeight !== "" ? `<div class="weight-tip">上周：${escapeHTML(previousWeight)} kg</div>` : ""}
                </div>
                <ul class="points">${points}</ul>
              </div>
            </div>
            <details class="detail">
              <summary>📖 怎么做</summary>
              <div class="detail-body">
                ${guideHTML}
                ${item.detail ? `<p><strong>训练建议：</strong>${escapeHTML(item.detail)}</p>` : ""}
              </div>
            </details>
          </article>
        `;
      }

      function renderProgress(items, doneCount, total) {
        const totalAcrossDays = ["A", "B", "C"].reduce((sum, day) => sum + workouts[day].items.length, 0);
        const doneAcrossDays = ["A", "B", "C"].reduce((sum, day) => {
          return sum + workouts[day].items.filter((item) => isDone(day, state.week, item.id)).length;
        }, 0);
        const percent = totalAcrossDays === 0 ? 0 : Math.round((doneAcrossDays / totalAcrossDays) * 100);
        els.progressBar.style.width = `${percent}%`;
        els.progressText.textContent = `第${state.week}周已完成 ${doneAcrossDays}/${totalAcrossDays} 个动作（${percent}%）。当前页面显示 ${state.day}：${doneCount}/${total}。`;
      }

      function getExerciseGuide(item) {
        const guide = exerciseGuides[item.id];
        return guide ? { blocks: guide } : { blocks: ["暂无教学说明。"] };
      }

      function getEquipmentMeta(type) {
        if (type === "器械") {
          return { className: "equipment-machine", icon: "🔧", label: "器械" };
        }
        if (type === "哑铃") {
          return { className: "equipment-dumbbell", icon: "🏋️", label: "哑铃" };
        }
        return { className: "equipment-bodyweight", icon: "🧘", label: "自重" };
      }

      function escapeHTML(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function startTimer(item) {
        const duration = item.rest;
        timerState = {
          active: true,
          duration,
          remaining: duration,
          endAt: Date.now() + duration * 1000,
          pausedAt: 0,
          raf: 0,
          item,
          paused: false,
        };
        els.timerTitle.textContent = `${item.name} 休息计时`;
        els.timerDetail.textContent = `${workouts[state.day].title} · ${item.sets} · 组间休息 ${duration} 秒`;
        els.timerToggle.textContent = "暂停";
        els.timerOverlay.classList.add("show");
        els.timerOverlay.setAttribute("aria-hidden", "false");
        renderTimer();
        tickTimer();
      }

      function tickTimer() {
        cancelAnimationFrame(timerState.raf);
        const loop = () => {
          if (!timerState.active || timerState.paused) return;
          const remaining = Math.max(0, Math.ceil((timerState.endAt - Date.now()) / 1000));
          timerState.remaining = remaining;
          renderTimer();
          if (remaining <= 0) {
            onTimerComplete();
            return;
          }
          timerState.raf = requestAnimationFrame(loop);
        };
        timerState.raf = requestAnimationFrame(loop);
      }

      function renderTimer() {
        const remaining = timerState.remaining;
        els.timerNumber.textContent = String(remaining).padStart(2, "0");
        const pct = timerState.duration === 0 ? 0 : (remaining / timerState.duration) * 100;
        els.timerProgressBar.style.width = `${pct}%`;
      }

      function toggleTimer() {
        if (!timerState.active) return;
        timerState.paused = !timerState.paused;
        if (timerState.paused) {
          timerState.pausedAt = Date.now();
          cancelAnimationFrame(timerState.raf);
          els.timerToggle.textContent = "继续";
        } else {
          const pausedDuration = Date.now() - timerState.pausedAt;
          timerState.endAt += pausedDuration;
          els.timerToggle.textContent = "暂停";
          tickTimer();
        }
      }

      function finishTimer() {
        vibrate([60, 40, 60]);
        closeTimer();
      }

      function closeTimer() {
        cancelAnimationFrame(timerState.raf);
        timerState.active = false;
        timerState.paused = false;
        timerState.item = null;
        els.timerOverlay.classList.remove("show");
        els.timerOverlay.setAttribute("aria-hidden", "true");
      }

      function onTimerComplete() {
        timerState.remaining = 0;
        renderTimer();
        vibrate([180, 90, 180, 90, 260]);
        els.timerDetail.textContent = "时间到，开始下一组";
        els.timerToggle.textContent = "完成";
        setTimeout(() => {
          if (timerState.active) {
            closeTimer();
          }
        }, 1100);
      }

      function vibrate(pattern) {
        if (navigator.vibrate) {
          navigator.vibrate(pattern);
        }
      }
    })();
  </script>
</body>
</html>
